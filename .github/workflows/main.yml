name: deploy-custom-nginx

on:
#  push:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mynginx .

      - name: Save image
        run: docker save -o mynginx.tar mynginx

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 13.51.158.88 >> ~/.ssh/known_hosts

      - name: Copy image to server
        run: scp mynginx.tar ec2-user@13.51.158.88:/tmp/

      - name: Load and Run container
        run: ansible-playbook -i inventory deploy.yml
        
