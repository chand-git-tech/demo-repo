name: deploy-custom-nginx

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: sudo apt update && sudo apt install podman -y

      - name: Build Docker image
        run: podman build -t mynginx .

      - name: Save image
        run: podman save mynginx | gzip > mynginx.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOCAL_NODE1 }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 10.89.27.36 >> ~/.ssh/known_hosts

      - name: Copy image to server
        run: scp mynginx.tar.gz chand@10.89.27.36:/tmp/

      - name: Load and run container
        run: |
          ssh chand@10.89.27.36 << 'EOF'
            podman load < /tmp/mynginx.tar.gz
            podman stop mynginx || true
            podman rm mynginx || true
            podman run -d -p 8081:80 --name myapp mynginx
          EOF
