- hosts: web
  tasks:
    - name: Load image
      command: gunzip -c /tmp/mynginx.tar.gz | docker load

    - name: Stop old container
      command: docker stop myapp
      ignore_errors: yes

    - name: Remove old container
      command: docker rm myapp
      ignore_errors: yes

    - name: Run container
      command: docker run -d -p 80:80 --name myapp mynginx
