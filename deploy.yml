- hosts: web
  tasks:
    - name: Load image
      command: podman load -i /tmp/myapp.tar

    - name: Stop old container
      command: podman stop myapp
      ignore_errors: yes

    - name: Remove old container
      command: podman rm myapp
      ignore_errors: yes

    - name: Run container
      command: podman run -d -p 8081:80 --name myapp myapp:latest
